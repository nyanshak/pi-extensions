<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-web</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --bg-hover: #1f1f3a;
      --accent: #e94560;
      --accent-hover: #ff6b8a;
      --success: #4ecca3;
      --warning: #f9a825;
      --muted: #666;
      --text: #eee;
      --text-dim: #888;
      --border: #2a2a4a;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .logo {
      color: var(--accent);
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    .session-selector {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex: 1;
    }
    
    .session-select {
      background: var(--bg-tertiary);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      min-width: 200px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    .session-select:hover {
      border-color: var(--accent);
    }
    
    .btn {
      background: var(--bg-tertiary);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }
    
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    
    .btn-icon {
      padding: 0.5rem;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Workspace bar */
    .workspace-bar {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .workspace-label {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-right: 0.5rem;
    }
    
    .workspace-path {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--success);
      flex: 1;
    }
    
    /* Main chat area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    
    .message {
      margin-bottom: 1.5rem;
      max-width: 800px;
    }
    
    .message-user {
      margin-left: auto;
    }
    
    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    
    .message-user .message-header {
      flex-direction: row-reverse;
    }
    
    .message-role {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    
    .message-agent .message-role {
      background: var(--bg-tertiary);
      color: var(--accent);
    }
    
    .message-user .message-role {
      background: var(--accent);
      color: white;
    }
    
    .message-content {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 1rem;
      line-height: 1.6;
    }
    
    .message-user .message-content {
      background: var(--bg-tertiary);
      border-bottom-right-radius: 4px;
    }
    
    .message-agent .message-content {
      border-bottom-left-radius: 4px;
    }
    
    .message-content pre {
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    
    .message-content code {
      background: var(--bg-primary);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.9em;
    }
    
    .message-content pre code {
      background: none;
      padding: 0;
    }
    
    /* Tool call */
    .tool-call {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    
    .tool-header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      background: var(--bg-tertiary);
      transition: background 0.15s;
    }
    
    .tool-header:hover {
      background: var(--bg-hover);
    }
    
    .tool-icon {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 0.75rem;
      font-size: 0.75rem;
    }
    
    .tool-name {
      font-weight: 600;
      font-size: 0.9rem;
      flex: 1;
    }
    
    .tool-status {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-right: 0.75rem;
    }
    
    .tool-toggle {
      color: var(--text-dim);
      transition: transform 0.2s;
    }
    
    .tool-call.expanded .tool-toggle {
      transform: rotate(180deg);
    }
    
    .tool-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    
    .tool-call.expanded .tool-body {
      display: block;
    }
    
    .tool-section {
      padding: 0.75rem 1rem;
    }
    
    .tool-section-title {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .tool-section pre {
      background: var(--bg-primary);
      border-radius: 6px;
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    /* Thinking block */
    .thinking-block {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--warning);
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
    }
    
    .thinking-label {
      font-size: 0.75rem;
      color: var(--warning);
      text-transform: uppercase;
    }
    
    /* Input area */
    .input-area {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 1rem;
    }
    
    .input-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    
    .input-container {
      flex: 1;
      position: relative;
    }
    
    #message-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 200px;
    }
    
    #message-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    /* Slash command autocomplete */
    .autocomplete {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .autocomplete.active {
      display: block;
    }
    
    .autocomplete-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .autocomplete-item:hover,
    .autocomplete-item.selected {
      background: var(--bg-hover);
    }
    
    .autocomplete-item .cmd-name {
      font-weight: 600;
    }
    
    .autocomplete-item .cmd-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    
    .autocomplete-hint {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--bg-primary);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    
    /* Slash commands dropdown */
    .slash-menu {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .slash-menu.active {
      display: block;
    }
    
    .slash-menu-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    
    .slash-menu-item {
      padding: 0.6rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .slash-menu-item:hover {
      background: var(--bg-hover);
    }
    
    /* Connection status */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      background: var(--bg-tertiary);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    
    .status-badge.connected .status-dot {
      background: var(--success);
    }
    
    .status-badge.disconnected .status-dot {
      background: var(--accent);
    }
    
    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      text-align: center;
      padding: 2rem;
    }
    
    .empty-state h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    
    .empty-state p {
      font-size: 0.9rem;
      max-width: 400px;
    }
    
    /* Loading indicator */
    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Modal for new session */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 450px;
      max-width: 90%;
    }
    
    .modal h2 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    
    .modal-field {
      margin-bottom: 1rem;
    }
    
    .modal-field label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }
    
    .modal-field input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .modal-field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">pi-web</div>
    <div class="session-selector">
      <select id="session-select" class="session-select">
        <option value="">No sessions</option>
      </select>
      <button id="new-session-btn" class="btn">+ New</button>
      <button id="delete-session-btn" class="btn btn-icon" title="Delete session">×</button>
    </div>
    <div class="status-badge disconnected" id="status-badge">
      <span class="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
  </header>
  
  <div class="workspace-bar">
    <span class="workspace-label">Workspace:</span>
    <span class="workspace-path" id="workspace-path">Not set</span>
    <button id="change-workspace-btn" class="btn" style="margin-left: auto;">Change</button>
  </div>
  
  <main id="messages">
    <div class="empty-state" id="empty-state">
      <h2>No active session</h2>
      <p>Start a new session to begin chatting with pi. Each session maintains its own conversation history and workspace.</p>
    </div>
  </main>
  
  <div class="input-area">
    <div class="input-wrapper">
      <button id="slash-btn" class="btn btn-icon" title="Slash commands">/</button>
      <div class="input-container">
        <div class="slash-menu" id="slash-menu"></div>
        <div class="autocomplete" id="autocomplete"></div>
        <textarea id="message-input" placeholder="Send a message to pi... (Tab to autocomplete commands, / for menu)" rows="1"></textarea>
      </div>
      <button id="send-btn" class="btn btn-primary">Send</button>
    </div>
  </div>
  
  <!-- New Session Modal -->
  <div class="modal-overlay" id="new-session-modal">
    <div class="modal">
      <h2>New Session</h2>
      <div class="modal-field">
        <label>Workspace folder (optional)</label>
        <input type="text" id="modal-workspace" placeholder="/path/to/project">
      </div>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-create">Create</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let ws = null;
    let currentSessionId = null;
    let sessions = new Map(); // sessionId -> { messages, workspace }
    let availableCommands = [];
    let autocompleteIndex = -1;
    let slashMenuOpen = false;
    let requestId = 0;
    let pendingRequest = null;
    
    // DOM elements
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('empty-state');
    const sessionSelectEl = document.getElementById('session-select');
    const workspacePathEl = document.getElementById('workspace-path');
    const messageInputEl = document.getElementById('message-input');
    const slashMenuEl = document.getElementById('slash-menu');
    const autocompleteEl = document.getElementById('autocomplete');
    const statusBadgeEl = document.getElementById('status-badge');
    const statusTextEl = document.getElementById('status-text');
    
    // Extract WebSocket URL from current page URL
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    // Connect to WebSocket
    function connect() {
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        updateStatus(true);
        sendRequest('initialize', {});
      };
      
      ws.onclose = () => {
        updateStatus(false);
      };
      
      ws.onerror = () => {
        updateStatus(false);
      };
      
      ws.onmessage = (event) => {
        handleMessage(JSON.parse(event.data));
      };
    }
    
    function updateStatus(connected) {
      statusBadgeEl.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
      statusTextEl.textContent = connected ? 'Connected' : 'Disconnected';
    }
    
    function sendRequest(method, params) {
      return new Promise((resolve, reject) => {
        const id = ++requestId;
        pendingRequest = { resolve, reject, method };
        
        ws.send(JSON.stringify({
          jsonrpc: '2.0',
          id,
          method,
          params
        }));
        
        // Timeout
        setTimeout(() => {
          if (pendingRequest?.id === id) {
            pendingRequest = null;
            reject(new Error('Request timeout'));
          }
        }, 30000);
      });
    }
    
    function sendNotification(method, params) {
      ws.send(JSON.stringify({
        jsonrpc: '2.0',
        method,
        params
      }));
    }
    
    function handleMessage(msg) {
      // Response to our request
      if (msg.id && pendingRequest) {
        const req = pendingRequest;
        pendingRequest = null;
        
        if (msg.error) {
          req.reject(new Error(msg.error.message));
        } else {
          req.resolve(msg.result);
        }
        return;
      }
      
      // Notification
      if (msg.method) {
        handleNotification(msg);
      }
    }
    
    async function handleNotification(msg) {
      switch (msg.method) {
        case 'initialize':
          if (msg.params?.availableCommands) {
            availableCommands = msg.params.availableCommands;
            updateSlashMenu();
          }
          break;
          
        case 'session/update':
          if (msg.params?.sessionUpdate === 'available_commands_update') {
            availableCommands = msg.params.availableCommands || [];
            updateSlashMenu();
          }
          if (msg.params?.thinking?.content) {
            appendThinking(msg.params.sessionId, msg.params.thinking.content);
          }
          break;
          
        case 'agent_message':
          appendAgentMessage(msg.params);
          break;
          
        case 'agent_message_chunk':
          appendChunk(msg.params);
          break;
          
        case 'tool_call_start':
          appendToolCall(msg.params);
          break;
          
        case 'tool_call_end':
          finalizeToolCall(msg.params);
          break;
      }
    }
    
    // Session management
    async function createSession(workspace = null) {
      try {
        const result = await sendRequest('session_new', { 
          model: 'claude-sonnet-4-20250514',
          workspace
        });
        
        currentSessionId = result.sessionId;
        sessions.set(currentSessionId, { messages: [], workspace });
        updateSessionSelect();
        updateWorkspaceDisplay();
        clearMessages();
        
        return currentSessionId;
      } catch (err) {
        console.error('Failed to create session:', err);
      }
    }
    
    async function sendMessage(content) {
      if (!currentSessionId) return;
      
      // Add user message to UI
      appendUserMessage(content);
      
      // Send to server
      try {
        await sendRequest('session_prompt', {
          sessionId: currentSessionId,
          prompt: content
        });
      } catch (err) {
        console.error('Failed to send message:', err);
      }
    }
    
    function updateSessionSelect() {
      sessionSelectEl.innerHTML = '';
      
      if (sessions.size === 0) {
        sessionSelectEl.innerHTML = '<option value="">No sessions</option>';
        return;
      }
      
      for (const [id] of sessions) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = id.slice(-8);
        if (id === currentSessionId) opt.selected = true;
        sessionSelectEl.appendChild(opt);
      }
    }
    
    function updateWorkspaceDisplay() {
      if (!currentSessionId) {
        workspacePathEl.textContent = 'Not set';
        return;
      }
      
      const session = sessions.get(currentSessionId);
      workspacePathEl.textContent = session?.workspace || 'Not set';
    }
    
    // UI rendering
    function clearMessages() {
      emptyStateEl.style.display = 'none';
      messagesEl.innerHTML = '';
    }
    
    function appendUserMessage(content) {
      const session = sessions.get(currentSessionId);
      if (!session) return;
      
      session.messages.push({ role: 'user', content });
      
      const div = document.createElement('div');
      div.className = 'message message-user';
      div.innerHTML = `
        <div class="message-header">
          <span class="message-role">You</span>
        </div>
        <div class="message-content">${escapeHtml(content)}</div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }
    
    function appendAgentMessage(params) {
      const session = sessions.get(currentSessionId);
      if (!session) return;
      
      session.messages.push({ role: 'assistant', content: params.content });
      
      const div = document.createElement('div');
      div.className = 'message message-agent';
      div.innerHTML = `
        <div class="message-header">
          <span class="message-role">pi</span>
        </div>
        <div class="message-content" id="msg-${Date.now()}">${formatContent(params.content)}</div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }
    
    function appendChunk(params) {
      // Handle streaming chunks
      const lastMsg = messagesEl.lastElementChild;
      if (lastMsg?.classList.contains('message-agent')) {
        const content = lastMsg.querySelector('.message-content');
        if (content) {
          content.innerHTML += params.content;
        }
      }
      scrollToBottom();
    }
    
    function appendThinking(sessionId, content) {
      // Find or create thinking block for session
      let thinking = messagesEl.querySelector(`.thinking-${sessionId}`);
      if (!thinking) {
        thinking = document.createElement('div');
        thinking.className = `thinking-block thinking-${sessionId}`;
        thinking.innerHTML = `
          <div class="thinking-header">
            <span class="thinking-label">Thinking</span>
          </div>
          <div class="thinking-content"></div>
        `;
        messagesEl.appendChild(thinking);
      }
      thinking.querySelector('.thinking-content').textContent = content;
      scrollToBottom();
    }
    
    function appendToolCall(params) {
      const { toolCallId, toolName, arguments: args } = params;
      
      const session = sessions.get(currentSessionId);
      if (!session) return;
      
      session.messages.push({ role: 'tool', toolCallId, toolName, arguments: args });
      
      const div = document.createElement('div');
      div.className = 'tool-call';
      div.id = `tool-${toolCallId}`;
      div.innerHTML = `
        <div class="tool-header" onclick="toggleTool('${toolCallId}')">
          <div class="tool-icon">⌘</div>
          <span class="tool-name">${toolName}</span>
          <span class="tool-status">Running...</span>
          <span class="tool-toggle">▼</span>
        </div>
        <div class="tool-body">
          <div class="tool-section">
            <div class="tool-section-title">Input</div>
            <pre>${escapeHtml(formatJson(args))}</pre>
          </div>
          <div class="tool-section" id="tool-output-${toolCallId}">
            <div class="tool-section-title">Output</div>
            <pre>Waiting...</pre>
          </div>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }
    
    function finalizeToolCall(params) {
      const { toolCallId, result, isError } = params;
      const toolDiv = document.getElementById(`tool-${toolCallId}`);
      if (!toolDiv) return;
      
      const status = toolDiv.querySelector('.tool-status');
      status.textContent = isError ? 'Error' : 'Done';
      status.style.color = isError ? 'var(--accent)' : 'var(--success)';
      
      const outputSection = document.getElementById(`tool-output-${toolCallId}`);
      if (outputSection) {
        outputSection.querySelector('pre').textContent = formatJson(result);
      }
    }
    
    function toggleTool(toolCallId) {
      const toolDiv = document.getElementById(`tool-${toolCallId}`);
      if (toolDiv) {
        toolDiv.classList.toggle('expanded');
      }
    }
    
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    // Content formatting
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatContent(content) {
      if (typeof content === 'string') {
        return escapeHtml(content)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n/g, '<br>');
      }
      return escapeHtml(JSON.stringify(content));
    }
    
    function formatJson(obj) {
      try {
        return JSON.stringify(obj, null, 2);
      } catch {
        return String(obj);
      }
    }
    
    // Slash command menu
    function updateSlashMenu() {
      slashMenuEl.innerHTML = `
        <div class="slash-menu-header">Slash Commands</div>
        ${availableCommands.map(cmd => `
          <div class="slash-menu-item" data-cmd="${cmd.name}">
            <span>
              <strong>${cmd.name}</strong>
              ${cmd.description ? `<span style="color: var(--text-dim); margin-left: 0.5rem;">${cmd.description}</span>` : ''}
            </span>
            ${cmd.input?.hint ? `<span class="autocomplete-hint">${cmd.input.hint}</span>` : ''}
          </div>
        `).join('')}
      `;
      
      slashMenuEl.querySelectorAll('.slash-menu-item').forEach(item => {
        item.addEventListener('click', () => {
          insertCommand(item.dataset.cmd);
          closeSlashMenu();
        });
      });
    }
    
    function openSlashMenu() {
      slashMenuOpen = true;
      slashMenuEl.classList.add('active');
      autocompleteEl.classList.remove('active');
    }
    
    function closeSlashMenu() {
      slashMenuOpen = false;
      slashMenuEl.classList.remove('active');
    }
    
    function insertCommand(cmd) {
      const input = messageInputEl;
      input.value = '/' + cmd + ' ';
      input.focus();
    }
    
    // Autocomplete
    function updateAutocomplete(filter) {
      if (!filter) {
        autocompleteEl.classList.remove('active');
        return;
      }
      
      const filtered = availableCommands.filter(cmd => 
        cmd.name.startsWith(filter)
      );
      
      if (filtered.length === 0) {
        autocompleteEl.classList.remove('active');
        return;
      }
      
      autocompleteEl.innerHTML = filtered.map((cmd, i) => `
        <div class="autocomplete-item ${i === autocompleteIndex ? 'selected' : ''}" data-cmd="${cmd.name}">
          <div>
            <span class="cmd-name">${cmd.name}</span>
            ${cmd.description ? `<span class="cmd-desc">${cmd.description}</span>` : ''}
          </div>
          ${cmd.input?.hint ? `<span class="autocomplete-hint">${cmd.input.hint}</span>` : ''}
        </div>
      `).join('');
      
      autocompleteEl.classList.add('active');
      
      autocompleteEl.querySelectorAll('.autocomplete-item').forEach(item => {
        item.addEventListener('click', () => {
          insertCommand(item.dataset.cmd);
          autocompleteEl.classList.remove('active');
        });
      });
    }
    
    // Event listeners
    document.getElementById('new-session-btn').addEventListener('click', () => {
      document.getElementById('new-session-modal').classList.add('active');
    });
    
    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('new-session-modal').classList.remove('active');
    });
    
    document.getElementById('modal-create').addEventListener('click', async () => {
      const workspace = document.getElementById('modal-workspace').value || null;
      document.getElementById('new-session-modal').classList.remove('active');
      await createSession(workspace);
    });
    
    document.getElementById('slash-btn').addEventListener('click', () => {
      if (slashMenuOpen) {
        closeSlashMenu();
      } else {
        openSlashMenu();
      }
    });
    
    messageInputEl.addEventListener('input', () => {
      const value = messageInputEl.value;
      
      // Check for slash command
      if (value.startsWith('/')) {
        const filter = value.slice(1);
        updateAutocomplete(filter);
        autocompleteIndex = 0;
      } else {
        autocompleteEl.classList.remove('active');
        closeSlashMenu();
      }
      
      // Auto-resize
      messageInputEl.style.height = 'auto';
      messageInputEl.style.height = Math.min(messageInputEl.scrollHeight, 200) + 'px';
    });
    
    messageInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Tab' && autocompleteEl.classList.contains('active')) {
        e.preventDefault();
        const items = autocompleteEl.querySelectorAll('.autocomplete-item');
        if (items.length > 0) {
          insertCommand(items[autocompleteIndex].dataset.cmd);
          autocompleteEl.classList.remove('active');
        }
      } else if (e.key === 'ArrowDown' && autocompleteEl.classList.contains('active')) {
        e.preventDefault();
        autocompleteIndex = Math.min(autocompleteIndex + 1, availableCommands.length - 1);
        updateAutocomplete(messageInputEl.value.slice(1));
      } else if (e.key === 'ArrowUp' && autocompleteEl.classList.contains('active')) {
        e.preventDefault();
        autocompleteIndex = Math.max(autocompleteIndex - 1, 0);
        updateAutocomplete(messageInputEl.value.slice(1));
      } else if (e.key === 'Enter' && !e.shiftKey && !slashMenuOpen) {
        e.preventDefault();
        const content = messageInputEl.value.trim();
        if (content && currentSessionId) {
          messageInputEl.value = '';
          messageInputEl.style.height = 'auto';
          sendMessage(content);
        }
      } else if (e.key === 'Escape') {
        closeSlashMenu();
        autocompleteEl.classList.remove('active');
      }
    });
    
    document.getElementById('send-btn').addEventListener('click', () => {
      const content = messageInputEl.value.trim();
      if (content && currentSessionId) {
        messageInputEl.value = '';
        messageInputEl.style.height = 'auto';
        sendMessage(content);
      }
    });
    
    sessionSelectEl.addEventListener('change', () => {
      const newId = sessionSelectEl.value;
      if (newId && newId !== currentSessionId) {
        currentSessionId = newId;
        // Load session messages
        const session = sessions.get(currentSessionId);
        if (session) {
          clearMessages();
          for (const msg of session.messages) {
            if (msg.role === 'user') {
              appendUserMessage(msg.content);
            } else if (msg.role === 'assistant') {
              appendAgentMessage({ content: msg.content });
            }
          }
          updateWorkspaceDisplay();
        }
      }
    });
    
    // Make toggleTool global for onclick
    window.toggleTool = toggleTool;
    
    // Connect on load
    connect();
  </script>
</body>
</html>
